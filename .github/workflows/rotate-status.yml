name: Rotate GitHub Status

on:
  schedule:
  # Default rotation every 30 minutes
  - cron: "*/30 * * * *"
  
  # Morning rotation (2:24 AM - 6:30 AM EST)
  - cron: "*/15 6-11 * * *"
  
  # Morning startup message (2:20 AM EST)
  - cron: "20 6 * * *"
  
  # Evening wrap-up message (4:20 PM EST)
  - cron: "20 21 * * *"
  
  # Night mode (11:30 PM - 1:00 AM EST)
  - cron: "*/30 23,0,1 * * *"

jobs:
  update-status:
    runs-on: ubuntu-latest

    steps:
      - name: Debug - Show current time
        run: |
          echo "UTC time: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Local time: $(date '+%Y-%m-%d %H:%M:%S %Z')"

      - name: Determine current mode (evening / morning / night / default)
        id: mode
        run: |
          # Convert UTC to Eastern Time (EST/EDT)
          # Use TZ environment variable to handle daylight saving automatically
          HOUR=$(TZ='America/New_York' date +'%H')
          MIN=$(TZ='America/New_York' date +'%M')
    
          echo "Eastern Time: $HOUR:$MIN"
    
          # 02:20 EST (morning startup)
          if [[ "$HOUR" == "02" && "$MIN" == "20" ]]; then
            echo "mode=morning" >> $GITHUB_OUTPUT
            exit 0
          fi
    
          # Morning mode: 2:24 AM - 6:30 AM EST
          if (( (HOUR==2 && MIN>=24) || (HOUR==3) || (HOUR==4) || (HOUR==5) || (HOUR==6 && MIN<=30) )); then
            echo "mode=morning" >> $GITHUB_OUTPUT
            exit 0
          fi
    
          # Night mode: 11:30 PM - 1:00 AM EST
          if (( (HOUR==23 && MIN>=30) || (HOUR==0) )); then
            echo "mode=night" >> $GITHUB_OUTPUT
            exit 0
          fi
    
          echo "mode=default" >> $GITHUB_OUTPUT
    
      - name: Select status
        id: status
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          echo "Selected mode: $MODE"
    
          if [[ "$MODE" == "evening" ]]; then
            OPTIONS=(
              "🌇 Wrapping Up the Last Job"
              "🧾 Finishing Today's Work Orders"
              "🚐 Heading Back from Service Calls"
              "🔧 One More Repair Before Home"
              "⚙️ Shop Closed, Phone Still On"
            )
    
          elif [[ "$MODE" == "morning" ]]; then
            OPTIONS=(
              "☕ First Coffee, First Call"
              "🔧 Opening the Toolbox"
              "🚐 Rolling Out for Service Calls"
              "🌅 Early Bird Gets the Repair"
              "📅 Booking Jobs for the Day"
              "🔋 Batteries, Brakes & Breakfast"
              "🛠️ Mobile Mechanic Mode Activated"
              "🚗 Starting the Day Under the Hood"
            )
    
          elif [[ "$MODE" == "night" ]]; then
            OPTIONS=(
              "🌙 Off Duty Until Morning"
              "😴 Recharging Like a Car Battery"
              "🔋 Technician Offline"
              "🚗 Parked for the Night"
              "🛌 Toolbox Closed"
              "💤 Available Again at Sunrise"
              "🌌 Emergency Calls Tomorrow"
            )
    
          else
            OPTIONS=(
              "🔧 Mobile Auto Repair On-Site"
              "🚐 Traveling to the Next Customer"
              "🛠️ Diagnosing Vehicle Issues"
              "🔋 Battery Testing in Progress"
              "🚗 Keeping Maine Drivers Moving"
              "⚙️ Turning Wrenches and Solving Problems"
              "📱 Scheduling Service Calls"
              "🔍 Hunting Down Electrical Gremlins"
              "🧰 Toolbox Open, Let's Fix It"
              "⛽ Roadside Assistance Available"
              "🚘 Customer Vehicle Inspection"
              "📦 Waiting on Parts Delivery"
              "🔧 Ibby Auto Works at your Service"
              "🚐 On The Road"
              "🛠️ Diagnosing A Vehicle"
              "📱 Contacting Customers"
              "⚙️ Keeping Cars Reliable"
              "🚗 Helping Drivers Get Back On The Road"
            )
          fi
    
          RAND=$((RANDOM % ${#OPTIONS[@]}))
          SELECTED="${OPTIONS[$RAND]}"
          echo "Selected status: $SELECTED"
    
          echo "selected=$SELECTED" >> $GITHUB_OUTPUT
    
      - name: Update GitHub Status
        env:
          GITHUB_TOKEN: ${{ secrets.STATUS_TOKEN }}
          RAW: ${{ steps.status.outputs.selected }}
        run: |
          if [[ -z "$GITHUB_TOKEN" ]]; then
            echo "ERROR: STATUS_TOKEN is not set in secrets"
            exit 1
          fi
          
          EMOJI=$(echo "$RAW" | awk '{print $1}')
          MESSAGE=$(echo "$RAW" | awk '{$1=""; print $0}' | xargs)
          
          echo "Updating status:"
          echo "  Emoji: $EMOJI"
          echo "  Message: $MESSAGE"
    
          gh api graphql -f query='
            mutation ($emoji: String, $message: String) {
              changeUserStatus(input: {
                emoji: $emoji,
                message: $message
              }) {
                status {
                  emoji
                  message
                }
              }
            }
          ' -F emoji="$EMOJI" -F message="$MESSAGE"
